<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAJA AI</title><style>
body{
margin:0;
background:#050816;
font-family:Arial,sans-serif;
color:#00ffff;
text-align:center;
overflow:hidden;
}

h1{
margin-top:50px;
font-size:50px;
text-shadow:0 0 20px cyan;
animation:pulse 2s infinite;
}

@keyframes pulse{
50%{transform:scale(1.05);}
}

.circle{
width:250px;
height:250px;
border:4px solid cyan;
border-radius:50%;
margin:30px auto;
box-shadow:0 0 40px cyan;
animation:spin 8s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

.chat{
width:90%;
max-width:500px;
margin:auto;
padding:15px;
background:#0d1328;
border:1px solid cyan;
border-radius:15px;
height:250px;
overflow:auto;
}

input{
width:70%;
padding:12px;
border:none;
border-radius:30px;
margin-top:15px;
}

button{
padding:12px 20px;
border:none;
border-radius:30px;
background:cyan;
font-weight:bold;
}

</style></head><body><h1>🤖 RAJA AI</h1><div class="circle"></div><div class="chat" id="chat">
<p><b>RAJA AI:</b> Welcome Raja 👑</p>
<p><b>RAJA AI:</b> I am online.</p>
</div><input id="msg" placeholder="Type here...">
<button onclick="send()">Send</button>
<button onclick="startVoice()">🎤 Speak</button><script>
function send(){
let msg=document.getElementById("msg").value;
let chat=document.getElementById("chat");

chat.innerHTML += "<p><b>You:</b> "+msg+"</p>";

let reply="I am still learning.";

if(msg.toLowerCase().includes("hello"))
reply="Hello Raja 👑";

if(msg.toLowerCase().includes("who are you"))
reply="I am RAJA AI 🤖";

if(msg.toLowerCase().includes("motivate"))
reply="Business meri chaal hai, paisa uska nateeja. 🔥";

chat.innerHTML += "<p><b>RAJA AI:</b> "+reply+"</p>";

document.getElementById("msg").value="";
chat.scrollTop=chat.scrollHeight;
}
function startVoice(){

const recognition =
new(window.SpeechRecognition ||
window.webkitSpeechRecognition)();

recognition.lang='en-US';

recognition.start();

recognition.onresult=function(event){

let text=event.results[0][0].transcript;

document.getElementById("msg").value=text;

send();

};

}
</script></body>
</html>
